name: Build Satlync Node Installer

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y fakeroot dpkg rpm libgtk-3-0 libnss3 libxss1 libxtst6

      - name: Install Node packages
        run: |
          cd installer
          npm ci

      - name: Build installer
        run: |
          cd installer
          npm run build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: satlync-build
          path: installer/dist/*
